<svg width="100%" viewBox="0 0 680 452" role="img" xmlns="http://www.w3.org/2000/svg">
<title>会计学全局框架</title>
<desc>会计学一切围绕会计等式:资产等于负债加所有者权益。六大会计要素是等式组成,借贷记账法是维持等式平衡的记账工具,会计循环从凭证到账簿到试算平衡到报表,产出三大报表。</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">会计学全局框架 · 一切围绕会计等式</text>
<rect x="120" y="44" width="440" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="65" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">会计等式（核心）</text>
<text x="340" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">资产 = 负债 + 所有者权益（永远相等）</text>
<line x1="340" y1="102" x2="340" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="120" y="126" width="440" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="147" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">六大会计要素</text>
<text x="340" y="166" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">资产·负债·所有者权益 ＋ 收入·费用·利润</text>
<line x1="340" y1="184" x2="340" y2="206" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="120" y="208" width="440" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="229" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">借贷记账法</text>
<text x="340" y="248" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">有借必有贷、借贷必相等（保等式平衡的工具）</text>
<line x1="340" y1="266" x2="340" y2="288" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="120" y="290" width="440" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="311" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">会计循环</text>
<text x="340" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">凭证 → 账簿 → 试算平衡 → 报表</text>
<line x1="340" y1="348" x2="340" y2="370" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="120" y="372" width="440" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="393" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">三大报表</text>
<text x="340" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">资产负债表 · 利润表 · 现金流量表</text>
</svg>
