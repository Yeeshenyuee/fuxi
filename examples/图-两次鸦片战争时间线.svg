<svg width="100%" viewBox="0 0 680 238" role="img" xmlns="http://www.w3.org/2000/svg">
<title>两次鸦片战争与不平等条约时间线</title>
<desc>第一次鸦片战争1840到1842，1842年签南京条约割香港岛，1844年望厦黄埔条约。第二次鸦片战争1856到1860，1858年签天津条约和中俄瑷珲条约，1860年签北京条约。</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="340" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">两次鸦片战争与不平等条约 · 时间线</text>
<text x="215" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#D85A30">第一次鸦片战争 1840–1842</text>
<text x="500" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1D9E75">第二次鸦片战争 1856–1860</text>
<line x1="345" y1="58" x2="345" y2="222" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="60" y1="160" x2="636" y2="160" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<circle cx="100" cy="160" r="5" fill="#D85A30"/><line x1="100" y1="165" x2="100" y2="184" stroke="#888780" stroke-width="0.5"/>
<text x="100" y="197" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">1840</text>
<text x="100" y="212" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">鸦片战争爆发</text>
<circle cx="195" cy="160" r="5" fill="#D85A30"/><line x1="195" y1="155" x2="195" y2="136" stroke="#888780" stroke-width="0.5"/>
<text x="195" y="131" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">1842</text>
<text x="195" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">南京条约·割香港岛</text>
<circle cx="290" cy="160" r="5" fill="#D85A30"/><line x1="290" y1="165" x2="290" y2="184" stroke="#888780" stroke-width="0.5"/>
<text x="290" y="197" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">1844</text>
<text x="290" y="212" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">望厦·黄埔条约</text>
<circle cx="400" cy="160" r="5" fill="#1D9E75"/><line x1="400" y1="155" x2="400" y2="136" stroke="#888780" stroke-width="0.5"/>
<text x="400" y="131" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">1856</text>
<text x="400" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">二次鸦战爆发</text>
<circle cx="500" cy="160" r="5" fill="#1D9E75"/><line x1="500" y1="165" x2="500" y2="184" stroke="#888780" stroke-width="0.5"/>
<text x="500" y="197" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">1858</text>
<text x="500" y="212" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">天津条约 + 瑷珲条约</text>
<circle cx="600" cy="160" r="5" fill="#1D9E75"/><line x1="600" y1="155" x2="600" y2="136" stroke="#888780" stroke-width="0.5"/>
<text x="600" y="131" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3d3d3a">1860</text>
<text x="600" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5f5e5a">北京条约</text>
</svg>
